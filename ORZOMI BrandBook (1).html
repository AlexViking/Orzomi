document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv>\n<div class=\"toc\"><span>02 — Logo construction<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">04<\u002Fspan><\u002Fdiv>\n<div class=\"toc\"><span>03 — Logo usage<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">05<\u002Fspan><\u002Fdiv>\n<div class=\"toc\"><span>04 — Color<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">06<\u002Fspan><\u002Fdiv>\n<div class=\"toc\"><span>05 — Typography<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">07<\u002Fspan><\u002Fdiv>\n<div class=\"toc\"><span>06 — Voice &amp; tone<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">08<\u002Fspan><\u002Fdiv>\n<div class=\"toc\"><span>07 — Imagery<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">09<\u002Fspan><\u002Fdiv>\n<div class=\"toc\"><span>08 — Iconography<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">10<\u002Fspan><\u002Fdiv>\n<div class=\"toc\" style=\"border-bottom:0\"><span>09 — Applications<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">11<\u002Fspan><\u002Fdiv>\n<p class=\"body mt16\" style=\"margin-top:auto;max-width:52ch\">Every measurement in this system — type scale, spacing, logo clear space — derives from the golden ratio (φ = 1.618) and its Fibonacci steps: 13, 21, 34, 55, 89.<\u002Fp>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>02<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"03 Brand story\">\n<div class=\"sec\"><span class=\"secn\">01<\u002Fspan><span class=\"lbl\">Brand story &amp; mission<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\" style=\"max-width:12ch\">We build software. All of it.<\u002Fh1>\n<p class=\"body mt16\" style=\"font-size:19px;max-width:56ch\">ORZOMI is a software house in the fullest sense: we ship our own products, we build websites and mobile apps for others, we develop games, and we teach the next generation how to program. Four practices, one standard of craft.<\u002Fp>\n<div class=\"grid mt24\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:21px\">\n<div class=\"tile\"><div class=\"vpn\">01 / PRODUCTS<\u002Fdiv><h3 class=\"h3\" style=\"margin-top:10px\">Our own software<\u002Fh3><p class=\"body\" style=\"font-size:15px;margin:8px 0 0\">Products we design, build and stand behind under our own name.<\u002Fp><\u002Fdiv>\n<div class=\"tile\"><div class=\"vpn\">02 / CLIENT WORK<\u002Fdiv><h3 class=\"h3\" style=\"margin-top:10px\">Web &amp; mobile<\u002Fh3><p class=\"body\" style=\"font-size:15px;margin:8px 0 0\">Websites and mobile apps that put other businesses online, done right.<\u002Fp><\u002Fdiv>\n<div class=\"tile\"><div class=\"vpn\">03 / GAMES<\u002Fdiv><h3 class=\"h3\" style=\"margin-top:10px\">Game development<\u002Fh3><p class=\"body\" style=\"font-size:15px;margin:8px 0 0\">Play is serious engineering. We build games with the same rigor as tools.<\u002Fp><\u002Fdiv>\n<div class=\"tile\"><div class=\"vpn\">04 / EDUCATION<\u002Fdiv><h3 class=\"h3\" style=\"margin-top:10px\">Teaching code<\u002Fh3><p class=\"body\" style=\"font-size:15px;margin:8px 0 0\">We train new programmers — the industry we want starts in the classroom.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"margin-top:auto\">\n<hr class=\"rule\">\n<p class=\"sg mt16\" style=\"font-size:24px;font-weight:500;max-width:30ch;margin-bottom:0\">Mission: make software — and software makers — in the right proportion.<\u002Fp>\n<\u002Fdiv>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>03<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"04 Logo construction\">\n<div class=\"sec\"><span class=\"secn\">02<\u002Fspan><span class=\"lbl\">Logo construction<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Built on the golden ratio<\u002Fh1>\n<p class=\"body mt16\" style=\"max-width:58ch\">The wordmark stacks the name in three rows of two letters inside a bold keyline frame. Its proportions follow the golden section: the frame, the letter heights and the intervals between rows step down by φ. Always reproduce it from the master vector file — never redraw it.<\u002Fp>\n<div class=\"fx gap24 mt24\" style=\"align-items:flex-start\">\n<svg class=\"mk\" style=\"width:235px;color:#524c45\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg>\n<div class=\"f1\">\n<div class=\"fib\" style=\"height:233px\">\n<div style=\"width:233px;height:233px;border:1px solid #524c45;position:relative\"><span class=\"mono\" style=\"font-size:14px;color:#8a857a;position:absolute;top:8px;left:10px\">21<\u002Fspan><div style=\"position:absolute;inset:0;border-radius:50%;border:1px solid #38342f\"><\u002Fdiv><\u002Fdiv>\n<div style=\"display:flex;flex-direction:column\"><div style=\"width:144px;height:144px;border:1px solid #524c45;border-left:0;position:relative\"><span class=\"mono\" style=\"font-size:13px;color:#8a857a;position:absolute;top:8px;left:10px\">13<\u002Fspan><div style=\"position:absolute;inset:0;border-radius:50%;border:1px solid #38342f\"><\u002Fdiv><\u002Fdiv><div style=\"display:flex\"><div style=\"width:89px;height:89px;border:1px solid #524c45;border-left:0;border-top:0;position:relative\"><span class=\"mono\" style=\"font-size:12px;color:#8a857a;position:absolute;top:6px;left:8px\">8<\u002Fspan><div style=\"position:absolute;inset:0;border-radius:50%;border:1px solid #38342f\"><\u002Fdiv><\u002Fdiv><div style=\"width:55px;height:55px;border:1px solid #524c45;border-left:0;border-top:0;position:relative;align-self:flex-end\"><span class=\"mono\" style=\"font-size:11px;color:#8a857a;position:absolute;top:4px;left:6px\">5<\u002Fspan><div style=\"position:absolute;inset:0;border-radius:50%;border:1px solid #38342f\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<p class=\"mono mt12\" style=\"font-size:12px;color:#8a857a;line-height:1.7\">Fibonacci construction grid<br>21 : 13 : 8 : 5 — each step ÷ φ<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"grid\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:21px;margin-top:auto\">\n<div class=\"vp\"><div class=\"vpn\">FRAME<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">A thin keyline frame, cut from the same fill as the letters. Never remove it.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">ROWS<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Three rows — OR / ZO / MI. Letter positions are fixed; never re-typeset.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">RATIO<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Frame proportion ≈ 1 : 1.58 — within a hair of φ (1.618).<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>04<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"05 Logo usage\">\n<div class=\"sec\"><span class=\"secn\">03<\u002Fspan><span class=\"lbl\">Logo usage<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Clear space &amp; conduct<\u002Fh1>\n<div class=\"fx gap24 mt24\">\n<div>\n<div style=\"border:1px dashed #524c45;padding:47px;display:inline-block\"><svg class=\"mk\" style=\"width:120px;display:block\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><\u002Fdiv>\n<p class=\"mono mt12\" style=\"font-size:12px;color:#8a857a;line-height:1.7\">Clear space = Ø of the letter O<br>on all four sides. Minimum size:<br>24 px digital · 12 mm print.<\u002Fp>\n<\u002Fdiv>\n<div class=\"f1\">\n<div class=\"lbl\">Approved colorways<\u002Fdiv>\n<div class=\"fx gap12 mt12\">\n<div class=\"col ac\" style=\"gap:8px\"><div style=\"background:#ece8df;padding:18px 14px\"><svg style=\"width:64px;display:block;color:#171717\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:#8a857a\">Ink / paper<\u002Fspan><\u002Fdiv>\n<div class=\"col ac\" style=\"gap:8px\"><div style=\"background:#100f0e;padding:18px 14px;border:1px solid #33302c\"><svg style=\"width:64px;display:block;color:#524c45\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:#8a857a\">Graphite / charcoal<\u002Fspan><\u002Fdiv>\n<div class=\"col ac\" style=\"gap:8px\"><div style=\"background:#100f0e;padding:18px 14px;border:1px solid #33302c\"><svg style=\"width:64px;display:block;color:#d9a038\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:#8a857a\">Gold / special<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<p class=\"body mt12\" style=\"font-size:15px\">Ink-on-paper is the primary mark. Graphite tone-on-tone is the dark-mode standard. Gold is reserved — covers, awards, launches.<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<div class=\"lbl\" style=\"margin-top:34px\">Never<\u002Fdiv>\n<div class=\"grid mt12\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:21px\">\n<div class=\"dont\"><svg style=\"width:70px;color:#524c45;transform:scaleX(1.6)\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><span class=\"dlbl\">✕ stretch or squash<\u002Fspan><\u002Fdiv>\n<div class=\"dont\"><svg style=\"width:70px;color:#524c45;transform:rotate(-14deg)\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><span class=\"dlbl\">✕ rotate<\u002Fspan><\u002Fdiv>\n<div class=\"dont\"><svg style=\"width:70px;color:#c9564a\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><span class=\"dlbl\">✕ off-palette colors<\u002Fspan><\u002Fdiv>\n<div class=\"dont\" style=\"background:repeating-linear-gradient(45deg,#3a352f 0 8px,#242120 8px 16px)\"><svg style=\"width:70px;color:#524c45\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><span class=\"dlbl\">✕ busy backgrounds<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>05<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"06 Color\">\n<div class=\"sec\"><span class=\"secn\">04<\u002Fspan><span class=\"lbl\">Color<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Charcoal, paper, gold<\u002Fh1>\n<p class=\"body mt16\" style=\"max-width:58ch\">A warm monochrome scale carries the brand; gold is the single accent, spent like money. Surfaces are dark; documents and product UI may invert to paper with the same scale.<\u002Fp>\n<div class=\"grid mt24 f1\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr;gap:21px\">\n<div class=\"sw2\" style=\"background:#100f0e;border:1px solid #33302c;color:#ece8df\"><span class=\"swh\">Charcoal 900<\u002Fspan><span class=\"swm\">#100F0E<br>RGB 16 15 14<br>CMYK 0 6 13 94<\u002Fspan><\u002Fdiv>\n<div class=\"sw2\" style=\"background:#1c1a18;border:1px solid #33302c;color:#ece8df\"><span class=\"swh\">Charcoal 700<\u002Fspan><span class=\"swm\">#1C1A18<br>RGB 28 26 24<br>CMYK 0 7 14 89<\u002Fspan><\u002Fdiv>\n<div class=\"sw2\" style=\"background:#524c45;color:#ece8df\"><span class=\"swh\">Graphite<\u002Fspan><span class=\"swm\">#524C45<br>RGB 82 76 69<br>CMYK 0 7 16 68<\u002Fspan><\u002Fdiv>\n<div class=\"sw2\" style=\"background:#8a857a;color:#100f0e\"><span class=\"swh\">Stone<\u002Fspan><span class=\"swm\">#8A857A<br>RGB 138 133 122<br>CMYK 0 4 12 46<\u002Fspan><\u002Fdiv>\n<div class=\"sw2\" style=\"background:#ece8df;color:#100f0e\"><span class=\"swh\">Paper<\u002Fspan><span class=\"swm\">#ECE8DF<br>RGB 236 232 223<br>CMYK 0 2 6 7<\u002Fspan><\u002Fdiv>\n<div class=\"sw2\" style=\"background:#d9a038;color:#100f0e\"><span class=\"swh\">Gold<\u002Fspan><span class=\"swm\">#D9A038<br>RGB 217 160 56<br>CMYK 0 26 74 15<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"margin-top:34px\">\n<div class=\"lbl\">Proportion — golden split<\u002Fdiv>\n<div class=\"fx mt12\" style=\"height:34px\">\n<div style=\"width:61.8%;background:#1c1a18;border:1px solid #33302c\"><\u002Fdiv>\n<div style=\"width:23.6%;background:#524c45\"><\u002Fdiv>\n<div style=\"width:9%;background:#ece8df\"><\u002Fdiv>\n<div style=\"width:5.6%;background:#d9a038\"><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"fx mt8 mono\" style=\"font-size:11px;color:#8a857a;gap:0\"><span style=\"width:61.8%\">charcoal 61.8%<\u002Fspan><span style=\"width:23.6%\">graphite 23.6%<\u002Fspan><span style=\"width:9%\">paper 9%<\u002Fspan><span style=\"width:5.6%\">gold<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>06<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"07 Typography\">\n<div class=\"sec\"><span class=\"secn\">05<\u002Fspan><span class=\"lbl\">Typography<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Two voices, one grid<\u002Fh1>\n<div class=\"mt24\" style=\"border:1px solid #33302c;padding:28px\">\n<div class=\"fx jb\"><span class=\"lbl\">Display — Space Grotesk<\u002Fspan><span class=\"mono mut\" style=\"font-size:12px\">400 / 500 / 700<\u002Fspan><\u002Fdiv>\n<p class=\"sg\" style=\"font-size:55px;font-weight:700;margin:12px 0 0;line-height:1.05\">Aa Bb Cc 0123<\u002Fp>\n<p class=\"sg mut\" style=\"font-size:21px;margin:4px 0 0\">Headlines, numbers, anything loud<\u002Fp>\n<\u002Fdiv>\n<div class=\"mt16\" style=\"border:1px solid #33302c;padding:28px\">\n<div class=\"fx jb\"><span class=\"lbl\">Body — Jost<\u002Fspan><span class=\"mono mut\" style=\"font-size:12px\">400 / 500 / 600<\u002Fspan><\u002Fdiv>\n<p style=\"font-size:28px;margin:12px 0 0\">Aa Bb Cc 0123 — geometric like the wordmark<\u002Fp>\n<p class=\"body\" style=\"font-size:16px;margin:6px 0 0\">Paragraphs, interface copy, captions. Set 16/26 with generous measure.<\u002Fp>\n<\u002Fdiv>\n<div class=\"mt16\" style=\"border:1px solid #33302c;padding:28px\">\n<div class=\"fx jb\"><span class=\"lbl\">Detail — IBM Plex Mono<\u002Fspan><span class=\"mono mut\" style=\"font-size:12px\">400 / 500<\u002Fspan><\u002Fdiv>\n<p class=\"mono\" style=\"font-size:18px;margin:12px 0 0\">Aa Bb Cc 0123 — labels, code, data<\u002Fp>\n<\u002Fdiv>\n<div style=\"margin-top:auto\">\n<div class=\"lbl\">Fibonacci type scale<\u002Fdiv>\n<div class=\"fx mt12\" style=\"align-items:baseline;gap:24px\"><span class=\"sg\" style=\"font-size:89px;font-weight:700;line-height:1\">89<\u002Fspan><span class=\"sg\" style=\"font-size:55px;font-weight:700\">55<\u002Fspan><span class=\"sg\" style=\"font-size:34px;font-weight:500\">34<\u002Fspan><span class=\"sg\" style=\"font-size:21px\">21<\u002Fspan><span style=\"font-size:16px\" class=\"mut\">16<\u002Fspan><span class=\"mono mut\" style=\"font-size:13px\">13<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>07<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"08 Voice and tone\">\n<div class=\"sec\"><span class=\"secn\">06<\u002Fspan><span class=\"lbl\">Voice &amp; tone<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Say less, mean it<\u002Fh1>\n<div class=\"grid mt24\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:21px\">\n<div class=\"vp\"><div class=\"vpn\">CLEAR, NOT CLEVER<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">We explain like good teachers. If a sentence needs a second read, rewrite it.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">CONFIDENT, NOT LOUD<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">No exclamation marks doing the work of substance. Facts over hype.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">PRECISE, LIKE CODE<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Concrete numbers, named things, no vague promises. Ship dates, not \"soon\".<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">WARM, LIKE A MENTOR<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">We talk to juniors and CEOs the same way: with patience and respect.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"say\" style=\"margin-top:34px\">\n<div class=\"sayc lbl\" style=\"border-top:0\">Say<\u002Fdiv><div class=\"sayc lbl\" style=\"border-top:0;border-left:1px solid #33302c\">Not<\u002Fdiv>\n<div class=\"sayc\">We build software products, client apps, games — and programmers.<\u002Fdiv><div class=\"sayc\" style=\"border-left:1px solid #33302c;color:#8a857a\">We are a 360° digital innovation ecosystem synergy partner.<\u002Fdiv>\n<div class=\"sayc\">Your app ships in 12 weeks. Here is the plan.<\u002Fdiv><div class=\"sayc\" style=\"border-left:1px solid #33302c;color:#8a857a\">We leverage agile best-practices for rapid time-to-value!!<\u002Fdiv>\n<div class=\"sayc\">Lesson 1: you will write real code today.<\u002Fdiv><div class=\"sayc\" style=\"border-left:1px solid #33302c;color:#8a857a\">Unlock your coding superpowers on a learning journey.<\u002Fdiv>\n<\u002Fdiv>\n<p class=\"body\" style=\"margin-top:auto;max-width:56ch\">Tone flexes by audience — more playful in games, more patient in education, more exact in client work — but the voice never changes.<\u002Fp>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>08<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"09 Imagery\">\n<div class=\"sec\"><span class=\"secn\">07<\u002Fspan><span class=\"lbl\">Imagery<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Real work, warm light<\u002Fh1>\n<p class=\"body mt16\" style=\"max-width:58ch\">Photography shows actual people making actual things: hands on keyboards, screens mid-build, classrooms mid-question. Warm, low-key lighting matches the charcoal surfaces. No stock handshakes, no rocket ships.<\u002Fp>\n<div class=\"grid mt24 f1\" style=\"display:grid;grid-template-columns:1.618fr 1fr;grid-template-rows:1fr 1fr;gap:21px\">\n<img src=\"e4e1dac0-4554-46a8-aeac-02834102d522\" alt=\"Developers at work, warm desk light\" style=\"grid-row:1/3;width:100%;height:100%;object-fit:cover;border:1px solid #38342f;box-sizing:border-box\">\n<img class=\"phimg\" src=\"e2b5fea0-cdad-4014-974a-cb907a588753\" alt=\"Hands on keyboard, warm side light\">\n<img class=\"phimg\" src=\"dac579c6-9beb-4dcf-aff3-b0e279e963a3\" alt=\"Mentor and student in dim classroom\">\n<\u002Fdiv>\n<div class=\"grid\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:21px;margin-top:34px\">\n<div class=\"vp\"><div class=\"vpn\">TREATMENT<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Slight warm grade toward charcoal shadows; gold only as natural light.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">CROP<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Frame subjects on golden-section lines, never dead center.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">HONESTY<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Our own offices, our own students, our own screens. No stock people.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>09<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"10 Iconography\">\n<div class=\"sec\"><span class=\"secn\">08<\u002Fspan><span class=\"lbl\">Iconography<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">Drawn like the mark<\u002Fh1>\n<p class=\"body mt16\" style=\"max-width:58ch\">Icons inherit the wordmark's DNA: geometric forms, uniform stroke, squared terminals, no fills, no rounding beyond perfect circles. Built on a 24 px grid with a 2 px stroke.<\u002Fp>\n<div class=\"fx gap16 mt24\">\n<div class=\"ico\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M8 6 L3 12 L8 18 M16 6 L21 12 L16 18\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"ico\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"13\"><\u002Frect><path d=\"M8 21 H16\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"ico\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"7\" y=\"2.5\" width=\"10\" height=\"19\"><\u002Frect><path d=\"M10 18.5 H14\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"ico\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M8 12 H16 M12 8 V16\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"ico\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M2 9 L12 4 L22 9 L12 14 Z M6 11.5 V17 C6 17 8 19.5 12 19.5 C16 19.5 18 17 18 17 V11.5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<div class=\"ico\"><svg width=\"32\" height=\"32\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12 H21 M12 3 C8 8 8 16 12 21 C16 16 16 8 12 3\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"fx mono mt12\" style=\"font-size:11px;color:#8a857a;gap:16px\"><span style=\"width:64px;text-align:center\">code<\u002Fspan><span style=\"width:64px;text-align:center\">web<\u002Fspan><span style=\"width:64px;text-align:center\">mobile<\u002Fspan><span style=\"width:64px;text-align:center\">games<\u002Fspan><span style=\"width:64px;text-align:center\">academy<\u002Fspan><span style=\"width:64px;text-align:center\">online<\u002Fspan><\u002Fdiv>\n<div class=\"grid\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:21px;margin-top:auto\">\n<div class=\"vp\"><div class=\"vpn\">GRID<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">24 px canvas, 2 px stroke, 2 px minimum gap between strokes.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">TERMINALS<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Butt caps, miter joins — the same cut as the wordmark letters.<\u002Fp><\u002Fdiv>\n<div class=\"vp\"><div class=\"vpn\">COLOR<\u002Fdiv><p class=\"body\" style=\"font-size:15px;margin:6px 0 0\">Paper on dark, ink on light. Gold only for a single active state.<\u002Fp><\u002Fdiv>\n<\u002Fdiv>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>10<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page\" data-screen-label=\"11 Applications\">\n<div class=\"sec\"><span class=\"secn\">09<\u002Fspan><span class=\"lbl\">Applications<\u002Fspan><\u002Fdiv>\n<h1 class=\"h1\">The brand on things<\u002Fh1>\n<div class=\"grid mt24 f1\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:21px\">\n<div class=\"col\" style=\"gap:8px\"><div class=\"deep col\" style=\"width:100%;aspect-ratio:1.75;border:1px solid #33302c;padding:22px;box-sizing:border-box;justify-content:space-between\"><svg style=\"width:44px;color:#524c45\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><div><div class=\"sg\" style=\"font-size:17px;font-weight:500\">Aziz Orzomi<\u002Fdiv><div class=\"mono\" style=\"font-size:11px;color:#8a857a;margin-top:2px\">founder — orzomi.com<\u002Fdiv><\u002Fdiv><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:#8a857a\">Business card — front, 89 × 51 mm<\u002Fspan><\u002Fdiv>\n<div class=\"col\" style=\"gap:8px\"><div class=\"col ac jc\" style=\"width:100%;aspect-ratio:1.75;background:#ece8df;padding:22px;box-sizing:border-box\"><svg style=\"width:52px;color:#171717\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:#8a857a\">Business card — back<\u002Fspan><\u002Fdiv>\n<div class=\"col\" style=\"gap:8px\"><div class=\"fx ac gap16 deep\" style=\"width:100%;aspect-ratio:1.75;border:1px solid #33302c;padding:22px;box-sizing:border-box\"><div class=\"col ac jc\" style=\"width:74px;height:74px;border-radius:50%;background:#1c1a18;border:1px solid #38342f;flex-shrink:0\"><svg style=\"width:30px;color:#ece8df\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><\u002Fdiv><div><div class=\"sg\" style=\"font-size:16px;font-weight:500\">@orzomi<\u002Fdiv><div class=\"mono\" style=\"font-size:11px;color:#8a857a;margin-top:2px\">avatar — mark on charcoal disc<\u002Fdiv><\u002Fdiv><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:#8a857a\">Social profile<\u002Fspan><\u002Fdiv>\n<div class=\"col\" style=\"gap:8px\"><div class=\"deep col\" style=\"width:100%;aspect-ratio:1.75;border:1px solid #33302c;padding:22px;box-sizing:border-box;justify-content:space-between\"><div class=\"fx jb ac\"><svg style=\"width:26px;color:#524c45\" viewBox=\"0 0 476 754\"><use href=\"#om\" width=\"476\" height=\"754\"><\u002Fuse><\u002Fsvg><span class=\"mono\" style=\"font-size:10px;color:#8a857a\">work — academy — games<\u002Fspan><\u002Fdiv><div><div class=\"sg\" style=\"font-size:21px;font-weight:700;line-height:1.15\">Software, crafted<br>in proportion.<\u002Fdiv><div class=\"mono gold\" style=\"font-size:11px;margin-top:8px\">→ start a project<\u002Fdiv><\u002Fdiv><\u002Fdiv><span class=\"mono\" style=\"font-size:11px;color:#8a857a\">Website hero<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n<p class=\"body\" style=\"margin-top:30px;max-width:58ch\">Every application follows the same recipe: one dark or paper surface, the mark small and quiet, type doing the work, gold for exactly one action.<\u002Fp>\n<div class=\"pfoot\"><span>ORZOMI Brand Guidelines<\u002Fspan><span>11<\u002Fspan><\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"page deep\" data-screen-label=\"12 Back cover\" style=\"justify-content:space-between\">\n<hr class=\"rule\">\n<div class=\"col ac\" style=\"gap:34px\"><svg class=\"mk\" style=\"width:140px\" viewBox=\"0 0
